name: Deploy CTI Community site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Community Dashboard (index.html)
        run: |
          # 파이썬 스크립트를 사용해 reports 폴더 내의 incident.json을 분석하고 대시보드 메인 화면을 만듭니다.
          python -c '
          import os, json
          
          reports_dir = "reports"
          html_content = """
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>CTI Incident Reports Community</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 1000px; margin: 0 auto; padding: 2rem; background-color: #f8fafc; }
                  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; }
                  h1 { color: #0f172a; margin: 0; }
                  .subtitle { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; }
                  .report-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: transform 0.2s; }
                  .report-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
                  .report-title { font-size: 1.25rem; font-weight: 600; color: #4f46e5; text-decoration: none; display: block; margin-bottom: 0.75rem; }
                  .report-title:hover { color: #4338ca; text-decoration: underline; }
                  .meta { font-size: 0.875rem; color: #64748b; display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; }
                  .tag { background: #e0e7ff; color: #3730a3; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
                  .tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
                  .empty { text-align: center; color: #94a3b8; margin-top: 4rem; font-style: italic; }
              </style>
          </head>
          <body>
              <div class="header">
                  <div>
                    <h1>🌍 CTI Incident Reports Community</h1>
                    <div class="subtitle">A collaborative space for sharing Threat Intelligence and Lessons Learned.</div>
                  </div>
              </div>
              <div id="reports-list">
          """
          
          has_reports = False
          if os.path.exists(reports_dir):
              # 최신 리포트가 위로 오게 정렬
              for folder in sorted(os.listdir(reports_dir), reverse=True):
                  folder_path = os.path.join(reports_dir, folder)
                  if os.path.isdir(folder_path):
                      json_path = os.path.join(folder_path, "incident.json")
                      
                      title = folder
                      date = folder.split("_")[0] if "_" in folder else "Unknown"
                      author = "Community Contributor"
                      tactics = []
                      
                      if os.path.exists(json_path):
                          try:
                              with open(json_path, "r", encoding="utf-8") as f:
                                  data = json.load(f)
                                  title = data.get("title", title)
                                  author = data.get("contributor", {}).get("githubUsername", author)
                                  if "ttps" in data:
                                      tactics = [ttp.get("tactic", "") for ttp in data["ttps"]][:5]
                          except Exception as e:
                              pass
                              
                      has_reports = True
                      
                      # Jekyll 빌더에 의해 .md가 .html로 변환되므로 html 확장자로 링크
                      html_content += f"""
                          <div class="report-card">
                              <a href="{folder_path}/report.html" class="report-title">{title}</a>
                              <div class="meta">
                                  <span>📅 {date}</span>
                                  <span>👤 @{author}</span>
                              </div>
                              <div class="tags">
                                  {"".join([f"<span class='tag'>{t}</span>" for t in set(tactics) if t])}
                              </div>
                          </div>
                      """
                      
          if not has_reports:
              html_content += "<div class='empty'>No reports have been shared yet. Be the first to contribute from the CTI Lessons Learned App! 🚀</div>"
              
          html_content += """
              </div>
          </body>
          </html>
          """
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html_content)
          '

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      # Jekyll을 사용해 Markdown(.md) 파일들을 예쁜 웹페이지(.html)로 자동 변환합니다.
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
